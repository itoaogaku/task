<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#068c89" />
  <!-- ホーム画面に追加したときブラウザのバー(URL欄)を消して全画面表示にする -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="タスク" />
  <!-- ホーム画面アイコン / PWA マニフェスト -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <title>タスク管理</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <!-- ヘッダー / タブ -->
    <header class="app-header">
      <div class="tabs" role="tablist">
        <button class="tab is-active" data-view="open" role="tab">タスク</button>
        <button class="tab" data-view="archive" role="tab">保管</button>
        <button class="tab" data-view="memo" role="tab">メモ</button>
        <button class="tab" data-view="done" role="tab">完了</button>
        <button class="tab" data-view="settings" role="tab">確認先</button>
      </div>
      <button class="icon-btn" id="reloadBtn" title="再読み込み" aria-label="再読み込み">⟳</button>
    </header>

    <!-- 一覧 -->
    <main class="list" id="taskList" aria-live="polite"></main>
    <div class="empty" id="emptyState" hidden>タスクはありません</div>
    <div class="toast" id="toast" hidden></div>

    <!-- 下部固定ドック（入力バー） -->
    <div class="dock" id="dock">
      <button type="button" class="close-fab" id="closeFab" aria-label="入力を閉じる">閉じる</button>
      <form class="composer" id="composer" autocomplete="off">
        <div class="composer-row">
          <button type="button" class="prio-btn" id="prioBtn" title="優先度">1</button>
          <input class="composer-input" id="titleInput" placeholder="タスクを入力して追加…" required />
          <button type="submit" class="add-btn" title="追加">＋</button>
        </div>
        <div class="composer-foot">
          <button type="button" class="archive-btn" id="archiveBtn">保管</button>
          <input type="date" class="archive-date-input" id="archiveDateInput" style="display:none" />
          <button type="button" class="repeat-btn" id="repeatBtn" style="display:none">登録</button>
          <div class="composer-tags" id="composerTags"></div>
        </div>
      </form>
    </div>

    <!-- 折りたたみ時の丸ボタン（タップで入力欄を開く） -->
    <button type="button" class="fab" id="fab" aria-label="タスクを追加">＋</button>
    <div class="composer-backdrop" id="composerBackdrop"></div>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>

  <!-- ▼一時デバッグ（visualViewport数値表示）。原因特定後に削除します -->
  <script>
  (function () {
    var box = document.createElement('div');
    box.style.cssText = 'position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);z-index:2147483647;background:rgba(200,0,0,.94);color:#fff;font:15px/1.6 monospace;padding:10px 14px;white-space:pre;pointer-events:none;border-radius:8px;';
    document.body.appendChild(box);
    var R = Math.round;
    function upd() {
      var vv = window.visualViewport, s = '';
      s += 'innerH=' + window.innerHeight + '  scrollY=' + R(window.pageYOffset);
      if (vv) s += '\nvv.h=' + R(vv.height) + '  vv.offTop=' + R(vv.offsetTop) + '  vv.pageTop=' + R(vv.pageTop);
      s += '\n--app-h=' + (getComputedStyle(document.documentElement).getPropertyValue('--app-h').trim() || '(unset)');
      var app = document.querySelector('.app');
      if (app) { var r = app.getBoundingClientRect(); s += '\napp: top=' + R(r.top) + ' bottom=' + R(r.bottom) + ' h=' + R(r.height); }
      box.textContent = s;
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', upd);
      window.visualViewport.addEventListener('scroll', upd);
    }
    window.addEventListener('scroll', upd, true);
    setInterval(upd, 150);
    upd();
  })();
  </script>
</body>
</html>
